<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediStock Pro | Hospital Inventory</title>
    <link rel="stylesheet" href="css/inventory.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

    <header class="main-header">
        <div class="header-left">
            <div class="logo-area">
                <div>
              <div class="image">
            <div class="logoimg"></div>
               <h3 class="logo"></h3>
               <h7 class="logo1"></h7>
           </div>
                </div>
            </div>
            <h1 style="color: #0E7490 ; margin-left: 200px; margin-top: -50px;">Hospital Inventory Management</h1>
        </div>
    
        <div class="user-info">
            <div class="user-details">
                <span class="user-name">Sarah J., RPh</span>
                <span class="user-role">Administrator</span>
            </div>
            <span class="material-symbols-outlined avatar">account_circle</span>
        </div>
    </header>

    <main class="page-wrapper">
        <section class="filters-card">
            <div class="filter-row">
                <div class="filter-group">
                    <label>Product Name</label>
                    <input type="text" id="productNameFilter" placeholder="e.g. Paracetamol">
                </div>
                <div class="filter-group">
                    <label>Manufacturer</label>
                    <input type="text" id="manufacturerFilter" placeholder="e.g. Pfizer">
                </div>
                <div class="filter-group">
                    <label>Item Number</label>
                    <input type="text" id="itemNumberFilter" placeholder="e.g. MED-100">
                </div>
                <div class="filter-group">
                    <label>Category</label>
                    <select id="categoryFilter">
                        <option value="">All Categories</option>
                        <option value="Medication">Medication</option>
                        <option value="Cream">Cream</option>
                        <option value="Syrup">Syrup</option>
                        <option value="Tablet">Tablet</option>
                    </select>
                </div>
                <div class="filter-actions">
                    <button class="btn-apply" id="applyFilterBtn">
                        <span class="material-symbols-outlined">filter_list</span> Apply Filters
                    </button>
                </div>
            </div>
        </section>

        <div class="dashboard-content">
            <section class="inventory-card">
                <div class="card-header">
                    <div class="header-title">
                        <h2>Current Stock Levels</h2>
                        <span class="badge" id="itemCountBadge">0 Items</span>
                    </div>
                    <button class="btn-add" id="addItemBtn">
                        <span class="material-symbols-outlined">add</span> Add New Item
                    </button>
                </div>

                <div class="table-responsive">
                    <table class="inventory-table">
                        <thead>
                            <tr>
                                <th>Product Details</th>
                                <th>Item No.</th>
                                <th>Manufacturer</th>
                                <th>Category</th>
                                <th>Unit Price</th>
                                <th>Stock Status</th>
                                <th>Expiry</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody">
                            </tbody>
                    </table>
                </div>
            </section>

            <aside class="side-stats">
                <div class="stat-card total">
                    <span class="material-symbols-outlined icon">inventory_2</span>
                    <h3>Total Inventory</h3>
                    <p class="value" id="totalItemsDisplay">0</p>
                </div>
                <div class="stat-card warning">
                    <span class="material-symbols-outlined icon">warning</span>
                    <h3>Critical Stock</h3>
                    <p class="value" id="criticalCountDisplay">0</p>
                </div>
            </aside>
        </div>
    </main>

    <div id="addItemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>New Inventory Entry</h2>
                <span class="close-button">&times;</span>
            </div>
            <form id="addItemForm" class="grid-form">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" name="productName" required>
                </div>
                <div class="form-group">
                    <label>Item ID / SKU</label>
                    <input type="text" name="itemNo" required>
                </div>
                <div class="form-group">
                    <label>Manufacturer</label>
                    <input type="text" name="manufacturer" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select name="category">
                        <option value="Medication">Medication</option>
                        <option value="Cream">Cream</option>
                        <option value="Syrup">Syrup</option>
                        <option value="Tablet">Tablet</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" step="0.01" name="price" required>
                </div>
                <div class="form-group">
                    <label>Initial Quantity</label>
                    <input type="number" name="quantity" required>
                </div>
                <div class="form-group full-width">
                    <label>Expiration Date</label>
                    <input type="date" name="expiryDate" required>
                </div>
                <button type="submit" class="btn-save">Confirm & Add</button>
            </form>
        </div>
    </div>

    <script src="inventory.js"></script>
</body>
</html>
